<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datro Noise | Official DatroNoise Website</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        
        body {
            background-color: black;
            color: white;
            margin: 0;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
        }

        .swiper {
            width: 100%;
            height: 100%;
        }

        .swiper-wrapper {
            display: flex !important;
            align-items: center !important;
            height: 100% !important;
        }

        .perspective-2000 {
            perspective: 2000px;
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .cursor-w-resize { cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5"><path d="M15 18l-6-6 6-6"/></svg>'), w-resize; }
        .cursor-e-resize { cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5"><path d="M9 18l6-6-6-6"/></svg>'), e-resize; }

        .image-card {
            will-change: transform, opacity, z-index;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-inner {
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
            width: 100%;
            height: 100%;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
            transition: transform 1.8s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        /* Explore Button */
        .explore-btn {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.4);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 10;
        }

        .explore-btn.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .explore-btn-content {
            padding: 8px 16px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(4px);
            border-radius: 2px;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .swiper-foreground {
            overflow: hidden !important;
            width: 100%;
            height: 100%;
        }

        /* Focus Mode */
        .focus-mode .swiper-slide:not(.swiper-slide-active) {
            opacity: 0.1 !important;
            pointer-events: none;
        }

        .focus-mode .swiper-slide-active .card-inner {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <main class="relative h-[100dvh] w-full flex items-center justify-center">
        
        <!-- Logo -->
        <div class="absolute top-0 w-full flex justify-center pt-[48px] sm:pt-[64px] z-[50] pointer-events-none">
            <img src="https://raw.githubusercontent.com/Alofte/DTN/main/Monochrom.png" alt="Logo" class="h-[72px] sm:h-[96px] opacity-80">
        </div>

        <!-- Background Swiper (EMPTY) -->
        <div class="absolute inset-0 z-0">
            <div class="swiper swiper-background">
                <div class="swiper-wrapper" id="bg-wrapper">
                    <!-- Slides injected by JS -->
                </div>
            </div>
        </div>

        <!-- Foreground Swiper -->
        <div class="absolute inset-0 z-10 perspective-2000">
            <div class="swiper swiper-foreground !overflow-hidden">
                <div class="swiper-wrapper" id="fg-wrapper">
                    <!-- Slides injected by JS -->
                </div>
            </div>
        </div>

        <!-- Navigation Areas -->
        <button id="prev-btn" class="absolute left-0 top-0 w-[20vw] h-full z-[40] cursor-w-resize"></button>
        <button id="next-btn" class="absolute right-0 top-0 w-[20vw] h-full z-[40] cursor-e-resize"></button>

        <!-- Footer Caption -->
        <div class="absolute bottom-0 w-full flex flex-col items-center pb-[86px] sm:pb-[100px] z-[50] pointer-events-none">
            <h3 id="slide-caption" class="text-[14px] sm:text-[16px] tracking-[4px] font-medium text-white/80"></h3>
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const SLIDES = [
            { id: 1, image: "https://raw.githubusercontent.com/Alofte/DTN/main/21.jpg", title: "21" },
            { id: 2, image: "https://raw.githubusercontent.com/Alofte/DTN/main/Derya.jpg", title: "Derya" },
            { id: 3, image: "https://raw.githubusercontent.com/Alofte/DTN/main/Elegant.jpg", title: "Elegant" },
            { id: 4, image: "https://raw.githubusercontent.com/Alofte/DTN/main/Gravity.jpg", title: "Gravity" },
            { id: 5, image: "https://raw.githubusercontent.com/Alofte/DTN/main/Heimat.jpg", title: "Heimat" },
            { id: 6, image: "https://raw.githubusercontent.com/Alofte/DTN/main/Kindered.jpg", title: "Kindred" },
            { id: 7, image: "https://raw.githubusercontent.com/Alofte/DTN/main/Laurent.jpg", title: "Laurent" }
        ];

        class ShuffleText {
            constructor(element) {
                this.element = element;
                this.originalText = element.innerText;
                this.characters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
                this.interval = null;
            }
            setText(newText) {
                this.originalText = newText;
                this.start();
            }
            start() {
                let iteration = 0;
                clearInterval(this.interval);
                this.interval = setInterval(() => {
                    this.element.innerText = this.originalText
                        .split("")
                        .map((char, index) => {
                            if (index < iteration) return this.originalText[index];
                            return this.characters[Math.floor(Math.random() * this.characters.length)];
                        })
                        .join("");
                    if (iteration >= this.originalText.length) clearInterval(this.interval);
                    iteration += 1 / 3;
                }, 30);
            }
        }

        // Initialize UI
        const bgWrapper = document.getElementById('bg-wrapper');
        const fgWrapper = document.getElementById('fg-wrapper');
        const slideCaption = document.getElementById('slide-caption');
        const captionShuffle = new ShuffleText(slideCaption);

        SLIDES.forEach(slide => {
            // Bg slide — EMPTY
            bgWrapper.innerHTML += `
                <div class="swiper-slide bg-black">
                    <div class="absolute inset-0 bg-black/50 z-[1]"></div>
                </div>`;
            
            // Fg slide — با دکمه explore
            fgWrapper.innerHTML += `
                <div class="swiper-slide !w-[280px] !h-[280px] sm:!w-[420px] sm:!h-[420px] image-card">
                    <div class="card-inner">
                        <img src="${slide.image}" alt="${slide.title}" class="w-full h-full object-cover select-none pointer-events-none">
                        <div class="explore-btn">
                            <div class="explore-btn-content">EXPLORE</div>
                        </div>
                    </div>
                </div>`;
        });

        const bgSwiper = new Swiper('.swiper-background', {
            effect: 'fade',
            fadeEffect: { crossFade: true },
            allowTouchMove: false,
            speed: 1800
        });

        const fgSwiper = new Swiper('.swiper-foreground', {
            centeredSlides: true,
            slidesPerView: 'auto',
            speed: 1800,
            watchSlidesProgress: true,
            slideToClickedSlide: true,
            resistanceRatio: 0.7,

            on: {
                init: function() {
                    captionShuffle.setText(SLIDES[0].title);
                    this.emit('setTranslate', 0);
                    setupExploreButtons(this);
                },
                slideChange: function() {
                    bgSwiper.slideTo(this.activeIndex);
                    captionShuffle.setText(SLIDES[this.activeIndex].title);
                    setupExploreButtons(this);
                },
                setTranslate: function() {
                    const swiper = this;
                    for (let i = 0; i < swiper.slides.length; i++) {
                        const slide = swiper.slides[i];
                        const progress = slide.progress;

                        let translateX, scale, opacity, zIndex;

                        if (Math.abs(progress) <= 1) {
                            translateX = progress * 50;
                            const absProgress = Math.abs(progress);
                            scale = 1 - (absProgress * 0.1);
                            opacity = 1 - (absProgress * 0.8);

                            // لایه‌بندی برای پوشاندن تصاویر پشت
                            if (progress === 0) {
                                zIndex = 5; // تصویر مرکزی در بالا
                            } else if (Math.abs(progress) === 1) {
                                zIndex = 2; // تصاویر کناری در لایه میانی
                            } else {
                                zIndex = 1; // تصاویر دورتر
                            }
                        } else {
                            translateX = progress > 0 ? 100 : -100;
                            scale = 0.8;
                            opacity = 0;
                            zIndex = 0;
                        }

                        slide.style.transform = `translateX(${translateX}%) scale(${scale})`;
                        slide.style.opacity = opacity;
                        slide.style.zIndex = zIndex;
                        slide.style.transition = 'transform 1.8s cubic-bezier(0.25, 0.1, 0.25, 1), opacity 1.8s cubic-bezier(0.25, 0.1, 0.25, 1), z-index 0s linear';
                        slide.style.pointerEvents = Math.abs(progress) < 0.6 ? 'auto' : 'none';
                    }
                }
            }
        });

        // Hover -> Show Explore Button
        function setupExploreButtons(swiper) {
            swiper.slides.forEach(slide => {
                const cardInner = slide.querySelector('.card-inner');
                const exploreBtn = slide.querySelector('.explore-btn');
                
                if (exploreBtn.classList.contains('visible')) {
                    exploreBtn.classList.remove('visible');
                }

                if (slide.classList.contains('swiper-slide-active')) {
                    const showButton = () => exploreBtn.classList.add('visible');
                    const hideButton = () => {
                        if (!document.body.classList.contains('focus-mode')) {
                            exploreBtn.classList.remove('visible');
                        }
                    };

                    cardInner.addEventListener('mouseenter', showButton);
                    cardInner.addEventListener('mouseleave', hideButton);

                    exploreBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        document.body.classList.add('focus-mode');
                        exploreBtn.classList.remove('visible');
                    });
                }
            });
        }

        // Mouse Wheel Navigation
        document.addEventListener('wheel', (e) => {
            e.preventDefault();
            if (e.deltaY > 0) {
                fgSwiper.slideNext();
            } else {
                fgSwiper.slidePrev();
            }
        }, { passive: false });

        // Escape to exit focus mode
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.body.classList.remove('focus-mode');
                setupExploreButtons(fgSwiper);
            }
        });

        // Navigation Buttons
        document.getElementById('prev-btn').addEventListener('click', () => fgSwiper.slidePrev());
        document.getElementById('next-btn').addEventListener('click', () => fgSwiper.slideNext());

    </script>
</body>
</html>
