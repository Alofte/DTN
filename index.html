<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DatroNoise - Offical Datro Noise Website</title>
    
    <!-- وارد کردن فونت کالیگرافی از گوگل فونت -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

    <style>
        /* تنظیمات کل صفحه */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000; /* پس‌زمینه مشکی مطلق */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Great Vibes', cursive; /* اعمال فونت کالیگرافی */
        }

        /* استایل متن کالیگرافی */
        .calligraphy-text {
            color: #ff6a00; /* رنگ نارنجی جذاب */
            font-size: 6rem; /* اندازه بزرگ متن */
            text-align: center;
            user-select: none;
            padding: 20px;
            
            /* ایجاد افکت درخشش نارنجی (Glow Effect) */
            text-shadow: 
                0 0 10px rgba(255, 106, 0, 0.8),
                0 0 20px rgba(255, 106, 0, 0.5),
                0 0 30px rgba(255, 106, 0, 0.3),
                0 0 40px rgba(255, 106, 0, 0.2);
            
            /* انیمیشن تپش ملایم نور */
            animation: pulse 3s ease-in-out infinite alternate;
        }

        /* انیمیشن برای درخشش متن */
        @keyframes pulse {
            0% {
                text-shadow: 
                    0 0 10px rgba(255, 106, 0, 0.8),
                    0 0 20px rgba(255, 106, 0, 0.5),
                    0 0 30px rgba(255, 106, 0, 0.3);
                transform: scale(1);
            }
            100% {
                text-shadow: 
                    0 0 15px rgba(255, 106, 0, 1),
                    0 0 30px rgba(255, 106, 0, 0.8),
                    0 0 45px rgba(255, 106, 0, 0.6),
                    0 0 60px rgba(255, 106, 0, 0.4);
                transform: scale(1.02); /* بزرگنمایی بسیار خفیف برای پویایی بیشتر */
            }
        }

        /* بهینه‌سازی برای گوشی‌های موبایل */
        @media (max-width: 768px) {
            .calligraphy-text {
                font-size: 3.5rem;
            }
        }
    </style>
</head>
<body>

    <!-- متن اصلی -->
    <div class="calligraphy-text">
        Datro Noise
    </div>

</body>
</html>
