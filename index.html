<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datro Noise | Official DatroNoise Website</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        
        body {
            background-color: black;
            color: white;
            margin: 0;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            user-select: none; 
            overscroll-behavior: none;
        }

        .swiper {
            width: 100%;
            height: 100%;
        }

        .swiper-wrapper {
            display: flex !important;
            align-items: center !important;
            height: 100% !important;
        }

        .perspective-2000 {
            perspective: 2000px;
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        @media (hover: hover) {
            .cursor-w-resize { 
                cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>'), w-resize; 
            }
            .cursor-e-resize { 
                cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>'), e-resize; 
            }
        }

        .image-card {
            will-change: transform, opacity, z-index;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .card-inner {
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
            width: 100%;
            height: 100%;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
            transition: transform 1.8s cubic-bezier(0.25, 0.1, 0.25, 1);
            z-index: 5;
        }

        /* ✅ Bottom Info Container */
        .track-bottom-container {
            position: absolute;
            left: 50%;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* ✅ Mobile: 30% Overlap (24px of 80px height) */
            top: calc(100% - 24px); 
            bottom: auto;
            justify-content: flex-start; 
            pointer-events: none; 
            z-index: 20;
            opacity: 0;
            transform: translateX(-50%) translateY(20px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        /* ✅ Desktop: Pushed down completely below image */
        @media (min-width: 640px) {
            .track-bottom-container {
                top: auto;
                bottom: -140px;
                justify-content: flex-start;
                transform: translateX(-50%) translateY(20px);
            }
        }

        /* ✅ Player Wrapper */
        .track-player-wrapper {
            width: 100%; 
            height: 80px;
            border-radius: 12px;
            overflow: hidden;
            pointer-events: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 15px; 
            background: #121212;
            z-index: 25;
        }

        /* ✅ Description Text */
        .track-sub-desc {
            width: 90%;
            max-width: 400px;
            text-align: center;
            font-size: 12px;
            line-height: 1.5;
            color: rgba(255,255,255,0.7);
            text-transform: none;
            font-family: 'Inter', sans-serif;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            padding: 0 10px;
            z-index: 25;
        }

        @media (min-width: 640px) {
            .track-sub-desc {
                font-size: 13px;
            }
        }

        /* ✅ Focus Mode Active States */
        .focus-mode .track-bottom-container {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(-50%) translateY(0);
        }

        /* Explore Button */
        .explore-btn {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.4);
            opacity: 0;
            pointer-events: none;
            z-index: 10;
            transition: opacity 0.3s ease;
        }

        .explore-btn.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .explore-btn-content {
            padding: 10px 20px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(4px);
            border-radius: 2px;
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: white;
            cursor: pointer;
        }

        .swiper-foreground {
            overflow: hidden !important;
            width: 100%;
            height: 100%;
        }

        /* ✅ Focus Mode Styles */
        .focus-mode .swiper-slide:not(.swiper-slide-active) {
            opacity: 0 !important;
            pointer-events: none;
        }

        .focus-mode .swiper-slide-active .card-inner {
            transform: scale(1.05);
            box-shadow: 0 0 60px rgba(255,255,255,0.1);
        }
        
        .focus-mode .cursor-w-resize,
        .focus-mode .cursor-e-resize {
            cursor: none;
        }

        .focus-mode #slide-caption {
            opacity: 0;
            transition: opacity 0.3s;
        }
    </style>
</head>
<body>

    <main class="relative h-[100dvh] w-full flex items-center justify-center">
        
        <!-- Logo -->
        <div class="absolute top-0 w-full flex justify-center pt-[20px] sm:pt-[40px] z-[50] pointer-events-none">
            <img src="https://raw.githubusercontent.com/Alofte/DTN/main/Monochrom.png" alt="Logo" class="h-[80px] sm:h-[120px] opacity-80">
        </div>

        <!-- Background Swiper -->
        <div class="absolute inset-0 z-0">
            <div class="swiper swiper-background">
                <div class="swiper-wrapper" id="bg-wrapper"></div>
            </div>
        </div>

        <!-- Foreground Swiper -->
        <div class="absolute inset-0 z-10 perspective-2000">
            <div class="swiper swiper-foreground !overflow-hidden">
                <div class="swiper-wrapper" id="fg-wrapper"></div>
            </div>
        </div>

        <!-- Navigation Areas -->
        <button id="prev-btn" class="absolute left-0 top-0 w-[20vw] h-full z-[40]"></button>
        <button id="next-btn" class="absolute right-0 top-0 w-[20vw] h-full z-[40]"></button>

        <!-- Footer Caption -->
        <div class="absolute bottom-0 w-full flex flex-col items-center pb-[60px] sm:pb-[100px] z-[50] pointer-events-none">
            <h3 id="slide-caption" class="text-[16px] sm:text-[22px] tracking-[4px] font-medium text-white/80"></h3>
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        // ✅ Updated Order and Descriptions
        const SLIDES = [
            { id: 1, image: "https://raw.githubusercontent.com/Alofte/DTN/main/11.jpg", title: "11", spotifyId: "2ZOGo01fvXIfOjC23kIJpl", desc: "11 stands between balance and change.<br>A moment where stability begins to transform into something new." },
            { id: 2, image: "https://raw.githubusercontent.com/Alofte/DTN/main/Laurent.jpg", title: "Laurent", spotifyId: "4israPNcTaeTHrgAWIM3wO", desc: "Laurent lives in motion and light.<br>Built on bright rhythm and effortless movement." },
            { id: 3, image: "https://raw.githubusercontent.com/Alofte/DTN/main/Gravity.jpg", title: "Gravity", spotifyId: "7dXvEqKMZWRpoDmsDRjAXJ", desc: "Gravity is the force that keeps us where we belong.<br>The invisible pull between where we are and where we're meant to be." },
            { id: 4, image: "https://raw.githubusercontent.com/Alofte/DTN/main/Derya.jpg", title: "Derya", spotifyId: "256vIa9pFAGYs9PEDeXsAM", desc: "Derya glides between tradition and modernity.<br>A smooth journey carried by warm rhythms and flowing sequences." },
            { id: 5, image: "https://raw.githubusercontent.com/Alofte/DTN/main/Kindered.jpg", title: "Kindred", spotifyId: "6GmBbf555gENiY5ITAKbCo", desc: "Kindred began as a guitar sketch at 2:30 AM.<br>A quiet reflection of connection and distance." },
            { id: 6, image: "https://raw.githubusercontent.com/Alofte/DTN/main/Heimat.jpg", title: "Heimat", spotifyId: "7CNVivjrtiYhIUN4Xt0ioT", desc: "Heimat feels like a place you almost remember.<br>A quiet tension between belonging and distance." },
            { id: 7, image: "https://raw.githubusercontent.com/Alofte/DTN/main/Elegant.jpg", title: "Elegant", spotifyId: "6QLWccrl8rkHM6w7oeIzVx", desc: "Sophisticated melodies that dance around a minimalistic core.<br>Elegant is a tribute to the beauty of simplicity and refined taste." },
            { id: 8, image: "https://raw.githubusercontent.com/Alofte/DTN/main/21.jpg", title: "21", spotifyId: "3S8LKVjFUvAWxC29KcE4F5", desc: "A moment where the past keeps moving, but nothing stays the same.<br>A quiet shift into something inevitable." }
        ];

        class ShuffleText {
            constructor(element) {
                this.element = element;
                this.originalText = element.innerText;
                this.characters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
                this.interval = null;
            }
            setText(newText) {
                this.originalText = newText;
                this.start();
            }
            start() {
                let iteration = 0;
                clearInterval(this.interval);
                this.interval = setInterval(() => {
                    this.element.innerText = this.originalText
                        .split("")
                        .map((char, index) => {
                            if (index < iteration) return this.originalText[index];
                            return this.characters[Math.floor(Math.random() * this.characters.length)];
                        })
                        .join("");
                    if (iteration >= this.originalText.length) clearInterval(this.interval);
                    iteration += 1 / 3;
                }, 30);
            }
        }

        const bgWrapper = document.getElementById('bg-wrapper');
        const fgWrapper = document.getElementById('fg-wrapper');
        const slideCaption = document.getElementById('slide-caption');
        const captionShuffle = new ShuffleText(slideCaption);

        SLIDES.forEach(slide => {
            bgWrapper.innerHTML += `
                <div class="swiper-slide bg-black">
                    <div class="absolute inset-0 bg-black/50 z-[1]"></div>
                </div>`;
            
            fgWrapper.innerHTML += `
                <div class="swiper-slide !w-[300px] !h-[300px] sm:!w-[420px] sm:!h-[420px] image-card">
                    
                    <!-- ✅ Bottom Info: Player + Description -->
                    <div class="track-bottom-container">
                        <div class="track-player-wrapper">
                            <iframe style="border-radius:12px" src="" width="100%" height="80" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
                        </div>
                        <div class="track-sub-desc">${slide.desc}</div>
                    </div>

                    <div class="card-inner">
                        <img src="${slide.image}" alt="${slide.title}" class="w-full h-full object-cover select-none pointer-events-none">
                        <div class="explore-btn">
                            <div class="explore-btn-content">EXPLORE</div>
                        </div>
                    </div>
                </div>`;
        });

        const bgSwiper = new Swiper('.swiper-background', {
            effect: 'fade',
            fadeEffect: { crossFade: true },
            allowTouchMove: false,
            speed: 1800
        });

        const fgSwiper = new Swiper('.swiper-foreground', {
            centeredSlides: true,
            slidesPerView: 'auto',
            speed: 1800,
            watchSlidesProgress: true,
            slideToClickedSlide: true,
            resistanceRatio: 0.7,
            allowTouchMove: true,

            on: {
                init: function() {
                    captionShuffle.setText(SLIDES[0].title);
                    this.emit('setTranslate', 0);
                    setupExploreButtons(this);
                },
                slideChange: function() {
                    bgSwiper.slideTo(this.activeIndex);
                    captionShuffle.setText(SLIDES[this.activeIndex].title);
                    setupExploreButtons(this);
                },
                setTranslate: function() {
                    const swiper = this;
                    const isFocusMode = document.body.classList.contains('focus-mode');

                    for (let i = 0; i < swiper.slides.length; i++) {
                        const slide = swiper.slides[i];
                        const progress = slide.progress;
                        const exploreBtn = slide.querySelector('.explore-btn');
                        
                        const isCenter = Math.abs(progress) < 0.1; 

                        let translateX, scale, opacity, zIndex;

                        if (Math.abs(progress) <= 1) {
                            translateX = progress * 50;
                            const absProgress = Math.abs(progress);
                            scale = 1 - (absProgress * 0.1);
                            opacity = 1 - (absProgress * 0.8);

                            if (isCenter) {
                                zIndex = 10;
                            } else {
                                zIndex = 1;
                            }
                        } else {
                            translateX = progress > 0 ? 100 : -100;
                            scale = 0.8;
                            opacity = 0;
                            zIndex = 0;
                        }

                        slide.style.transform = `translateX(${translateX}%) scale(${scale})`;
                        slide.style.opacity = opacity;
                        slide.style.zIndex = zIndex;
                        
                        if (isCenter && !isFocusMode) {
                            slide.style.pointerEvents = 'auto';
                            if(exploreBtn) exploreBtn.style.pointerEvents = 'auto';
                        } else {
                            slide.style.pointerEvents = 'none';
                            if(exploreBtn) {
                                exploreBtn.style.pointerEvents = 'none';
                                exploreBtn.classList.remove('visible');
                            }
                        }
                        
                        slide.style.transition = 'transform 1.8s cubic-bezier(0.25, 0.1, 0.25, 1), opacity 1.8s cubic-bezier(0.25, 0.1, 0.25, 1), z-index 0s linear';
                    }
                }
            }
        });

        function setupExploreButtons(swiper) {
            swiper.slides.forEach(slide => {
                const exploreBtn = slide.querySelector('.explore-btn');
                
                const showButton = () => {
                    if (Math.abs(slide.progress) < 0.1 && !document.body.classList.contains('focus-mode')) {
                        exploreBtn.classList.add('visible');
                    }
                };
                const hideButton = () => {
                    exploreBtn.classList.remove('visible');
                };

                slide.addEventListener('mouseenter', showButton);
                slide.addEventListener('mouseleave', hideButton);

                exploreBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    enterFocusMode(slide);
                });
            });
        }

        function enterFocusMode(activeSlide) {
            document.body.classList.add('focus-mode');
            
            // ✅ LOCK SWIPER
            fgSwiper.params.allowTouchMove = false;
            fgSwiper.update();

            const allBtns = document.querySelectorAll('.explore-btn');
            allBtns.forEach(btn => btn.classList.remove('visible'));

            const index = Array.from(fgSwiper.slides).indexOf(activeSlide);
            const data = SLIDES[index];

            if (data && data.spotifyId) {
                const iframe = activeSlide.querySelector('iframe');
                if (iframe) {
                    iframe.src = `https://open.spotify.com/embed/track/${data.spotifyId}?utm_source=generator&theme=0`;
                }
            }
        }

        function exitFocusMode() {
            document.body.classList.remove('focus-mode');
            
            // ✅ UNLOCK SWIPER
            fgSwiper.params.allowTouchMove = true;
            fgSwiper.update();

            const iframes = document.querySelectorAll('iframe');
            iframes.forEach(iframe => iframe.src = '');

            fgSwiper.emit('setTranslate'); 
        }

        document.addEventListener('click', (e) => {
            if (document.body.classList.contains('focus-mode')) {
                if (e.target.closest('.track-bottom-container')) return;
                if (e.target.closest('.card-inner')) return;
                exitFocusMode();
            }
        });

        document.addEventListener('wheel', (e) => {
            if (document.body.classList.contains('focus-mode')) return;
            e.preventDefault();
            if (e.deltaY > 0) fgSwiper.slideNext();
            else fgSwiper.slidePrev();
        }, { passive: false });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (document.body.classList.contains('focus-mode')) exitFocusMode();
                else {
                    if (e.key === 'ArrowRight') fgSwiper.slideNext();
                    if (e.key === 'ArrowLeft') fgSwiper.slidePrev();
                }
            }
        });

        document.getElementById('prev-btn').addEventListener('click', () => {
            if (!document.body.classList.contains('focus-mode')) fgSwiper.slidePrev();
        });
        document.getElementById('next-btn').addEventListener('click', () => {
            if (!document.body.classList.contains('focus-mode')) fgSwiper.slideNext();
        });

    </script>
</body>
</html>
